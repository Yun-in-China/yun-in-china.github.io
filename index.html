<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香云 · Yun in China</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    background: linear-gradient(180deg, #060d22 0%, #0a1633 40%, #16294f 75%, #23386b 100%);
    color: #eaf0fb;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* stars */
  #sky { position: fixed; inset: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100% { opacity:.15 } 50% { opacity:.9 } }
  .shoot {
    position: absolute; width: 110px; height: 1.5px;
    background: linear-gradient(90deg, rgba(255,255,255,.9), transparent);
    transform: rotate(-35deg); opacity: 0;
    animation: shoot 9s ease-in infinite;
  }
  @keyframes shoot {
    0%, 90% { opacity: 0; transform: translate(0,0) rotate(-35deg); }
    92% { opacity: 1; }
    100% { opacity: 0; transform: translate(-340px, 240px) rotate(-35deg); }
  }
  /* card */
  .card {
    position: relative; z-index: 2;
    text-align: center;
    padding: 60px 48px;
    max-width: 560px; width: calc(100% - 40px);
    background: rgba(10, 22, 51, .55);
    border: 1px solid rgba(160, 190, 255, .22);
    border-radius: 18px;
    backdrop-filter: blur(6px);
    box-shadow: 0 30px 80px rgba(0,0,0,.45);
  }
  .name {
    font-size: 4.2rem; letter-spacing: .08em; font-weight: 400;
    color: #fff; text-shadow: 0 0 30px rgba(120,165,255,.55);
  }
  .latin {
    margin-top: 10px; font-size: 1.05rem; letter-spacing: .42em;
    text-transform: uppercase; color: #9fb6e6; padding-left: .42em;
  }
  .divider {
    width: 70px; height: 1px; margin: 30px auto;
    background: linear-gradient(90deg, transparent, #7da0e8, transparent);
  }
  .status {
    font-size: 1.15rem; color: #cfdcf7; letter-spacing: .06em;
    animation: breathe 3.5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { opacity: .65 } 50% { opacity: 1 } }
  .tagline { margin-top: 14px; color: #8da4d4; font-size: .95rem; line-height: 1.8; }
  .foot {
    position: fixed; bottom: 22px; left: 0; right: 0; z-index: 2;
    text-align: center; color: #5e76aa; font-size: .8rem; letter-spacing: .14em;
  }
  @media (max-width: 480px) {
    .name { font-size: 3rem; }
    .card { padding: 44px 26px; }
  }
</style>
</head>
<body>
<div id="sky"></div>
<div class="card">
  <div class="name">云</div>
  <div class="latin">Yun in China</div>
  <div class="divider"></div>
  <div class="status">网站建设中 · Under Construction</div>
  <div class="tagline">美好的事物正在路上。<br>Something beautiful is being built here.</div>
</div>
<div class="foot">同一片天空 · UNDER THE SAME SKY</div>
<script>
  const sky = document.getElementById('sky');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + .5;
    s.style.width = s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.animationDuration = (3 + Math.random() * 4) + 's';
    sky.appendChild(s);
  }
  for (let i = 0; i < 2; i++) {
    const m = document.createElement('div');
    m.className = 'shoot';
    m.style.left = (55 + Math.random() * 35) + '%';
    m.style.top = (8 + Math.random() * 25) + '%';
    m.style.animationDelay = (i * 4.5 + 2) + 's';
    sky.appendChild(m);
  }
</script>
</body>
</html>
